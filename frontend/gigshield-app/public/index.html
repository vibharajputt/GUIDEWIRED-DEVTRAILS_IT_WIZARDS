<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1d4ed8" />
    <meta
      name="description"
      content="GigShield - AI-Powered Parametric Insurance for India's Gig Workers. Protecting delivery partners from income loss due to weather, pollution, curfews, and app outages."
    />
    <meta name="author" content="Team IT Wizards" />
    <meta
      name="keywords"
      content="insurance, gig economy, parametric, delivery, workers, India, GigShield, micro-insurance"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>🛡️ GigShield — Your Earnings, Protected Every Week</title>
    <style>
      /* Loading screen before React loads */
      #root:empty {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: linear-gradient(135deg, #eff6ff 0%, #f9fafb 100%);
        font-family: system-ui, -apple-system, sans-serif;
      }
      #root:empty::before {
        content: '🛡️';
        font-size: 4rem;
        margin-bottom: 1rem;
        animation: bounce 1s infinite;
      }
      #root:empty::after {
        content: 'Loading GigShield...';
        font-size: 1.25rem;
        color: #1d4ed8;
        font-weight: 600;
        animation: pulse 1.5s infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.4; }
      }
      @keyframes bounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-15px); }
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run GigShield.</noscript>
    <div id="root"></div>
  </body>
</html>
