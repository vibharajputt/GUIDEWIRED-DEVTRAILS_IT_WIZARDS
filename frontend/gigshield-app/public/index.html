<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>☔</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#4f46e5" />
    <meta
      name="description"
      content="RahatPay - AI-Powered Parametric Insurance for India's Gig Workers. Protecting delivery partners from income loss due to weather, pollution, curfews, and app outages."
    />
    <meta name="author" content="Team IT Wizards" />
    <meta
      name="keywords"
      content="insurance, gig economy, parametric, delivery, workers, India, RahatPay, micro-insurance"
    />
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>☔</text></svg>" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Premium Typographies -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <title>☔ RahatPay — Your Earnings, Protected Every Week</title>
    
    <style>
      /* Loading screen before React loads */
      html, body {
        margin: 0; padding: 0;
      }
      #root:empty {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%); /* Slate to Deep Indigo */
        font-family: 'Outfit', system-ui, sans-serif;
      }
      #root:empty::before {
        content: '';
        width: 60px;
        height: 60px;
        border: 4px solid rgba(255, 255, 255, 0.2);
        border-top-color: #818cf8;
        border-radius: 50%;
        margin-bottom: 24px;
        animation: spin 1s linear infinite;
        box-shadow: 0 0 20px rgba(129, 140, 248, 0.4);
      }
      #root:empty::after {
        content: 'Loading RahatPay...';
        font-size: 1.5rem;
        color: #ffffff;
        font-weight: 600;
        letter-spacing: 1px;
        background: -webkit-linear-gradient(45deg, #a5b4fc, #e0e7ff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: pulse 1.5s infinite;
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run RahatPay.</noscript>
    <div id="root"></div>
  </body>
</html>
